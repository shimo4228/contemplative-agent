# §C1 — axiom-removal A/B (remaining-issues Part C).
# Same episode window, two prompt arms (with/without axioms in the system
# prompt). Production temperature (1.0) — compare DISTRIBUTIONS, so run
# with --repeat 5 and judge via the view UI / output JSON, not assertions.
# Run: npx promptfoo@latest eval -c evals/experiments/c1_axiom_ablation.yaml --repeat 5
description: "§C1 axiom ablation — with-axioms vs no-axioms, same episodes"

prompts:
  - id: file://../prompts/distill_prompts.py:distill_step1
    label: with-axioms
  - id: file://../prompts/distill_prompts.py:distill_step1_no_axioms
    label: no-axioms

providers:
  - id: ollama:chat:qwen3.5:9b
    label: qwen3.5-9b
    config:
      num_ctx: 32768
      num_predict: 3000
      top_p: 0.95
      top_k: 20
      temperature: 1.0   # production distribution — NOT the regression setting
      think: false

defaultTest:
  assert:
    # Minimal guard only; the comparison itself is manual/distributional
    - type: not-contains
      value: "</untrusted_content>"

tests:
  - description: full synthetic window (40 episodes)
    vars:
      episode_file: ../../tests/fixtures/benchmark/synthetic.jsonl
